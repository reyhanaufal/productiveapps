<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productive Apps | Reyhan </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="mobile-header">
        <button id="mobile-toggle-btn">☰</button>
        <h2>🛠️ Tools</h2>
    </header>

    <div class="dashboard">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="logo-area">
                <h2>🛠️ Tools</h2>
                <p>Offline & Aman</p>
            </div>

            <div class="accordion-group">
                <button class="menu-category accordion-toggle active">
                    PDF Tools <span class="arrow">▼</span>
                </button>
                <div class="accordion-content open">
                    <button class="menu-btn active" data-target="pdf-tools/merge/view.html">
                        📄 Gabungkan PDF
                    </button>
                    <button class="menu-btn" data-target="pdf-tools/to-image/view.html">
                        🖼️ PDF ke Gambar
                    </button>
                    <button class="menu-btn" data-target="pdf-tools/image-to-pdf/view.html">
                        📸 Gambar ke PDF
                    </button>
                    <button class="menu-btn" data-target="pdf-tools/resize/view.html">
                        🗜️ Kompres PDF
                    </button>
                </div>
            </div>
            

            <div class="accordion-group">
                <button class="menu-category accordion-toggle">
                    Image Tools <span class="arrow">▼</span>
                </button>
                <div class="accordion-content">
                    <button class="menu-btn" data-target="image-tools/resize/view.html">
                        🖼️ Resize Gambar
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <iframe id="app-frame" src="pdf-tools/merge/view.html" frameborder="0"></iframe>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
