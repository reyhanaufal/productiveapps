<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kompres & Resize PDF</title>
    <link rel="stylesheet" href="../../css/style.css">
    
    <script src="../../lib/pdf.min.js"></script>
    <script src="../../lib/pdf-lib.min.js"></script>
    
    <style>
        /* Memperbaiki masalah scroll dari template standar Anda */
        body { overflow-y: auto !important; height: auto; padding-bottom: 50px; }
        
        .upload-area p { margin-top:10px; font-size:0.9em; color:#7f8c8d; }

        /* Pengaturan Ekspor CSS Standar Anda */
        .setting-group { margin-top: 15px; text-align: left; }
        .setting-group label { font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px; color: #333;}
        .setting-group select, .setting-group input { 
            width: 100%; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #ccc; 
            background-color: #fff;
            box-sizing: border-box; /* Agar padding tidak merusak lebar */
        }

        /* Pengaturan Ekspor Responsive untuk HP dan Laptop */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr; /* Default untuk HP */
            gap: 15px;
        }
        
        @media (min-width: 500px) {
            .settings-grid {
                grid-template-columns: 1fr 1fr; /* 2 Kolom untuk layar lebar */
            }
        }
        
        /* Flexbox khusus untuk input angka dan satuan agar sejajar */
        .input-inline {
            display: flex;
            gap: 10px;
        }
        .input-inline input { flex: 2; }
        .input-inline select { flex: 1; }
    </style>
</head>
<body>
    <div class="module-container" style="max-width: 800px; width: 95%;">
        <h2>🗜️ Kompres & Resize PDF</h2>
        
        <div class="upload-area">
            <input type="file" id="pdfInput" accept="application/pdf">
            <p style="margin-top:10px; font-size:0.9em; color:#7f8c8d;">Pilih 1 file PDF yang ukurannya ingin diperkecil.</p>
        </div>

        <div class="settings-grid">
            <div class="setting-group">
                <label>Target Ukuran Maksimal:</label>
                <div class="input-inline">
                    <input type="number" id="targetSize" placeholder="Contoh: 2">
                    <select id="sizeUnit">
                        <option value="MB">MB</option>
                        <option value="KB">KB</option>
                    </select>
                </div>
            </div>

            <div class="setting-group">
                <label>Informasi Sistem:</label>
                <p style="font-size: 0.85em; color: #7f8c8d; line-height: 1.4; margin-top: 5px;">
                    Resolusi dan kualitas elemen di dalam PDF akan diturunkan secara proporsional oleh sistem untuk menyesuaikan dengan target ukuran yang Anda minta.
                </p>
            </div>
        </div>
        
        <button id="processBtn" class="action-btn" style="margin-top: 20px;">Mulai Kompresi</button>
        <p id="statusMsg" style="text-align: center; margin-top: 15px; font-weight: bold;"></p>

    </div>

    <script src="logic.js"></script>
</body>
</html>
